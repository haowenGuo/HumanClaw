<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HumanClaw Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        :root {
            color-scheme: light;
            --primary: #73b8e5;
            --primary-soft: #dff1fb;
            --surface: rgba(255, 255, 255, 0.98);
            --surface-soft: #f5fbff;
            --border: rgba(115, 184, 229, 0.24);
            --text-main: #24445b;
            --text-muted: #628197;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            background: transparent;
            padding: 0;
        }

        #chat-shell {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 18px 50px rgba(30, 72, 98, 0.18);
        }

        #chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 14px 12px;
            background: linear-gradient(180deg, #eef8ff 0%, #f8fcff 100%);
            border-bottom: 1px solid rgba(115, 184, 229, 0.18);
            -webkit-app-region: drag;
        }

        #chat-header-text {
            min-width: 0;
        }

        #chat-title {
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            line-height: 1.2;
        }

        #chat-subtitle {
            margin-top: 4px;
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.3;
        }

        #close-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: rgba(115, 184, 229, 0.12);
            color: var(--text-main);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            -webkit-app-region: no-drag;
        }

        #close-btn:hover {
            background: rgba(115, 184, 229, 0.2);
        }

        #message-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background:
                linear-gradient(180deg, rgba(244, 250, 255, 0.96) 0%, rgba(250, 253, 255, 0.98) 100%);
        }

        .message-item {
            max-width: 88%;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .message-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #73b8e5 0%, #5ea7d8 100%);
            color: #ffffff;
        }

        .message-ai {
            align-self: flex-start;
            background: #ffffff;
            color: var(--text-main);
            border: 1px solid rgba(115, 184, 229, 0.16);
        }

        .message-system {
            align-self: center;
            max-width: 100%;
            padding: 4px 10px;
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(224, 241, 251, 0.72);
        }

        .message-loading {
            align-self: flex-start;
            color: var(--text-muted);
            font-size: 13px;
            padding: 6px 2px;
        }

        #composer {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #ffffff;
            border-top: 1px solid rgba(115, 184, 229, 0.16);
        }

        #message-input {
            width: 100%;
            min-height: 88px;
            max-height: 180px;
            resize: none;
            border: 1px solid rgba(115, 184, 229, 0.22);
            border-radius: 8px;
            padding: 12px;
            outline: none;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-main);
            background: var(--surface-soft);
            -webkit-app-region: no-drag;
        }

        #message-input:focus {
            border-color: rgba(115, 184, 229, 0.58);
            background: #ffffff;
        }

        #composer-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        #chat-status {
            min-width: 0;
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.4;
        }

        #send-btn {
            min-width: 86px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #ffffff;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        #send-btn:hover:enabled {
            background: #5ca5d7;
        }

        #send-btn:disabled {
            background: #b6d9ef;
            cursor: not-allowed;
        }

        #voice-btn {
            min-width: 86px;
            border: 1px solid rgba(115, 184, 229, 0.22);
            border-radius: 8px;
            background: rgba(115, 184, 229, 0.1);
            color: var(--text-main);
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        #voice-btn:hover:enabled {
            background: rgba(115, 184, 229, 0.18);
        }

        #voice-btn.is-active {
            background: #d9534f;
            border-color: #d9534f;
            color: #ffffff;
        }

        #voice-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(115, 184, 229, 0.4);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="chat-shell">
        <header id="chat-header">
            <div id="chat-header-text">
                <div id="chat-title">AIGL 对话窗</div>
                <div id="chat-subtitle">和桌宠说话，动作和表情会同步联动</div>
            </div>
            <button id="close-btn" type="button" aria-label="关闭聊天窗">×</button>
        </header>

        <div id="message-list"></div>

        <div id="composer">
            <textarea id="message-input" placeholder="说点什么，让 AIGL 陪你聊聊"></textarea>
            <div id="composer-footer">
                <div id="chat-status">已连接桌宠</div>
                <div style="display:flex; gap:8px;">
                    <button id="voice-btn" type="button">语音</button>
                    <button id="send-btn" type="button">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./src/chat-panel-app.js"></script>
</body>
</html>
