appId: com.humanclaw.desktop
productName: HumanClaw
artifactName: ${productName}-${version}-${arch}.${ext}
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraMetadata:
  main: electron/main.cjs
asar: true
asarUnpack:
  - electron/**/*.py
npmRebuild: false
win:
  executableName: HumanClaw
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  artifactName: ${productName}-Setup-${version}-win-${arch}.${ext}
portable:
  artifactName: ${productName}-Portable-${version}-win-${arch}.${ext}
